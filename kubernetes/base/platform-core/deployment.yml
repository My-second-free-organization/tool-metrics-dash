apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-core
  namespace: flowforge
spec:
  replicas: 3
  selector:
    matchLabels: { app: platform-core }
  template:
    metadata:
      labels: { app: platform-core }
    spec:
      containers:
        - name: platform-core
          image: flowforge/platform-core:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
